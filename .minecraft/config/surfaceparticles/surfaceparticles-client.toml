[general]
	#Master switch for the sprint particle fix.
	#When disabled, vanilla sprint particles are left untouched.
	enable_sprint_particles = true
	#Fix for the crack particles spawned while a block is being mined.
	#The particle takes the texture of the face being hit instead of the
	#model's single particle texture.
	#When disabled, vanilla hit particles are left untouched.
	enable_hit_particles = true
	#Fix for the particle cloud spawned when a block breaks.
	#Outer particles take the texture of the block face they sit on;
	#inner ones keep the vanilla particle texture.
	#When disabled, vanilla destroy particles are left untouched.
	enable_destroy_particles = true
