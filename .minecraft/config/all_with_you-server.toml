["Backpack Settings"]
	#Should skeletons have a chance to spawn with a backpack on their back?
	enableZombieSpawnWithBackpack = true
	#The chance that a skeleton will spawn with a backpack.
	# Default: 0.02
	# Range: 0.0 ~ 1.0
	zombieBackpackSpawnChance = 0.02
	#Maximum capacity (weight) of the backpack. Vanilla bundle is 64. Default is 256 (4 stacks).
	# Default: 256
	# Range: 64 ~ 1024
	backpackCapacity = 256
	#Enable slowness effect when carrying too many heavy backpacks.
	enableWeightPenalty = true
	#First level penalty.
	# Default: 2
	# Range: 1 ~ 36
	weight_1 = 2
	#Second level penalty.
	# Default: 4
	# Range: 2 ~ 36
	weight_2 = 4
	#Third level penalty.
	# Default: 6
	# Range: 3 ~ 36
	weight_3 = 6
	#Fourth level penalty.
	# Default: 8
	# Range: 4 ~ 36
	weight_4 = 8
