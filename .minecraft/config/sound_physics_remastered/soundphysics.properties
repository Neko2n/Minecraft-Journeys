# Enables/Disables all sound effects
enabled=true
# Affects how quiet a sound gets based on distance
# Lower values mean distant sounds are louder
# This setting requires you to be in singleplayer or having the mod installed on the server
# 1.0 is the physically correct value
attenuation_factor=1.0
# The ray distance at which reverb starts
# 0.0 disables reverb attenuation
reverb_attenuation_distance=0.0
# The volume of simulated reverberations
reverb_gain=1.0
# The brightness of reverberation
# Higher values result in more high frequencies in reverberation
# Lower values give a more muffled sound to the reverb
reverb_brightness=1.0
# The distance of reverb relative to the sound distance
reverb_distance=1.5
# The amount of sound that will be absorbed when traveling through blocks
block_absorption=1.0
# Higher values mean smaller objects won't be considered as occluding
occlusion_variation=0.35
# Smoothing time for direct low-pass filter gain and cutoff changes, in milliseconds
# 0 disables direct filter smoothing
direct_filter_smoothing_time_ms=150
# The default amount of sound reflectance energy for all blocks
# Lower values result in more conservative reverb simulation with shorter reverb tails
# Higher values result in more generous reverb simulation with higher reverb tails
default_block_reflectivity=0.5
# The default amount of occlusion for all blocks
# Lower values will result in sounds being less muffled through walls
# Higher values mean sounds may be inaudible through thicker walls
default_block_occlusion_factor=1.0
# Minecraft won't allow sounds to play past a certain distance
# This parameter is a multiplier for how far away a sound source is allowed to be in order for it to actually play
# This setting only takes effect in singleplayer worlds and when installed on the server
sound_distance_allowance=4.0
# A value controlling the amount that air absorbs high frequencies with distance
# A value of 1.0 is physically correct for air with normal humidity and temperature
# Higher values mean air will absorb more high frequencies with distance
# 0 disables this effect
air_absorption=1.0
# How much sound is filtered when the player is underwater
# 0.0 means no filter
# 1.0 means fully filtered
underwater_filter=0.9
# Whether sounds like cave, nether or underwater ambient sounds should have sound physics
evaluate_ambient_sounds=false
# The number of rays to trace to determine reverberation for each sound source
# More rays provides more consistent tracing results but takes more time to calculate
# Decrease this value if you experience lag spikes when sounds play
environment_evaluation_ray_count=32
# The number of rays bounces to trace to determine reverberation for each sound source
# More bounces provides more echo and sound ducting but takes more time to calculate
# Decrease this value if you experience lag spikes when sounds play
environment_evaluation_ray_bounces=4
# Reduces reflection/reverb ray and bounce budgets for distant, looped, and machinery sounds
# Direct occlusion rays and direct gain/cutoff math are not affected
adaptive_reflection_budget_enabled=true
# If sound hits a non-full-square side, block occlusion is multiplied by this
non_full_block_occlusion_factor=0.25
# The maximum amount of rays to determine occlusion
# Directly correlates to the amount of blocks between walls that are considered
max_occlusion_rays=16
# The amount at which occlusion is capped
max_occlusion=64.0
# If enabled, the occlusion calculation only uses one path between the sound source and the listener instead of 9
strict_occlusion=false
# Whether to try calculating where the sound should come from based on reflections
sound_direction_evaluation=true
# Skip redirecting non-occluded sounds (the ones you can see directly)
redirect_non_occluded_sounds=true
# If music discs or other longer sounds should be frequently reevaluated
update_moving_sounds=false
# The interval in ticks that moving sounds are reevaluated
# Lower values mean more frequent reevaluation but also more lag
# This option only takes effect if update_moving_sounds is enabled
sound_update_interval=5
# Experimental interval in ticks for periodic jukebox/record acoustic reevaluation
# Only used when record acoustic processing is enabled by record_test mode or sound_physics_apply_to_records
record_acoustic_update_interval_ticks=5
# The maximum distance a sound can be processed
max_sound_processing_distance=512.0
# Temporary diagnostic logging for the root sound-processing path.
# Use only while debugging because it logs per processed sound and ray.
sound_physics_trace_logging=false
# Checks OpenAL error state after selected source writes.
# Disabled by default because alGetError is expensive on per-source hot paths.
openal_error_checks=false
# Enables Sable acoustic snapshots and Sable-aware raycasts when Sable is installed.
# Disable this compatibility switch to force behavior close to original root-world SPR.
sable_acoustics_enabled=true
# Diagnostic switch that forces sound processing to use the root acoustic provider even when Sable is installed.
# This is not intended as final Sable behavior.
force_root_acoustic_provider=false
# Logs sampled Sable acoustic snapshot and cache diagnostics without enabling all debug logging.
sable_acoustic_debug_logging=false
# Apply acoustic occlusion/reverb to positional weather sounds.
sound_physics_apply_to_weather_sounds=true
# Apply acoustic occlusion/reverb to arbitrary positional ambient loops. Disabled by default because many ambient loops are global.
sound_physics_apply_to_positional_ambient_sounds=false
# Apply acoustic occlusion/reverb to known positional ambient machinery loops such as Aeronautics propeller bearings.
sound_physics_apply_to_positional_ambient_machinery=true
# Experimental: apply acoustic occlusion/reverb to jukebox records. Disabled by default; use record_test modes for diagnostics before enabling.
sound_physics_apply_to_records=false
# Apply acoustic occlusion/reverb to music. Disabled by default.
sound_physics_apply_to_music=false
# Apply acoustic occlusion/reverb to Crosswind global wind loops. Crosswind howl is not treated as a global wind loop.
sound_physics_apply_to_crosswind_wind=false
# Comma-separated sound ids or class patterns that force acoustic physics after positional safety checks. Use sound: or class: prefixes for substring matches.
sound_physics_sound_allowlist=
# Comma-separated sound ids or class patterns that skip acoustic physics.
sound_physics_sound_denylist=
# Logs sound policy decisions for propeller/Crosswind candidates and skipped sounds.
sound_policy_debug_logging=false
# Enables pitch shifting based on source/listener relative motion
doppler_enabled=true
# Scales the Doppler effect. 1.0 is realistic but boring; higher values are more dramatic
doppler_strength=2.5
# Speed of sound used for Doppler calculations, in blocks per second
doppler_speed_of_sound_blocks_per_second=343.0
# Minimum Doppler pitch multiplier
doppler_min_pitch_multiplier=0.5
# Maximum Doppler pitch multiplier
doppler_max_pitch_multiplier=2.0
# How often active sound pitch is updated.
doppler_update_interval_ticks=1
# Exponential smoothing time for Doppler pitch changes, in milliseconds
doppler_smoothing_time_ms=100
# Apply Doppler to positional block sounds
doppler_apply_to_block_sounds=true
# Apply Doppler to positional entity sounds
doppler_apply_to_entity_sounds=true
# Apply Doppler to positional weather sounds
doppler_apply_to_weather_sounds=true
# Apply Doppler to ambient sounds. Disabled by default because many ambient loops are non-positional
doppler_apply_to_ambient_sounds=false
# Apply Doppler to positional ambient loops after ambient Doppler is enabled. Keep disabled unless testing known positional machinery loops
doppler_apply_to_positional_ambient_sounds=false
# Apply manual Doppler to Sable delegated sounds. Disabled by default because Sable already writes OpenAL velocity and Doppler state
doppler_apply_to_sable_delegated_sounds=false
# Apply Doppler to music. Disabled by default
doppler_apply_to_music=false
# Experimental: apply Doppler to music discs and records. Disabled by default; record_test modes are safer for diagnostics.
doppler_apply_to_records=false
# Apply Doppler diagnostics/pitch control to known Aeronautics propeller bearing loops when safe.
doppler_apply_to_aeronautics_propellers=true
# Apply Doppler to known positional ambient machinery loops such as Aeronautics propeller bearings.
doppler_apply_to_positional_ambient_machinery=true
# Apply Doppler to Crosswind global wind loops. Crosswind howl is not treated as a global wind loop.
doppler_apply_to_crosswind_wind=false
# Comma-separated sound ids or class patterns that force Doppler after positional safety checks. Use sound: or class: prefixes for substring matches.
doppler_sound_allowlist=
# Comma-separated sound ids or class patterns that skip Doppler.
doppler_sound_denylist=
# Listener velocity samples above this speed are treated as unreliable
doppler_max_listener_speed_blocks_per_second=250.0
# Source velocity samples above this speed are treated as unreliable
doppler_max_source_speed_blocks_per_second=350.0
# Logs compact Doppler diagnostics periodically
doppler_debug_logging=false
# Extends OpenAL distance parameters for known Aeronautics propeller bearing loops.
propeller_long_range_enabled=true
# Long-range propeller tuning profile. Supported values: balanced, loud, legacy.
propeller_long_range_profile=balanced
# Theoretical maximum audible distance for a reference-size/reference-RPM Aeronautics propeller.
propeller_long_range_max_distance=896.0
# Minimum theoretical long-range distance for eligible propellers.
propeller_long_range_min_distance=96.0
# Hard cap for computed long-range propeller distance, preserving technical 1024-block support.
propeller_long_range_absolute_cap_blocks=1024.0
# Maximum acoustic processing distance used for propeller-specific long-range processing.
propeller_long_range_max_processing_distance=1024.0
# Fallback sail count for Aeronautics small propeller bearing loop when reflection cannot resolve size.
propeller_long_range_small_fallback_sails=16
# Fallback sail count for Aeronautics large propeller bearing loop when reflection cannot resolve size.
propeller_long_range_large_fallback_sails=48
# Sail count that maps to the maximum size factor.
propeller_long_range_size_reference_sails=48.0
# RPM proxy that maps to the maximum RPM factor.
propeller_long_range_rpm_reference=192.0
# Nonlinear exponent for propeller size range scaling.
propeller_long_range_size_exponent=1.15
# Nonlinear exponent for propeller RPM range scaling.
propeller_long_range_rpm_exponent=0.8
# Pitch value treated as reference RPM when real RPM cannot be reflected.
propeller_long_range_pitch_at_reference_rpm=1.6
# Reference distance as a fraction of computed propeller range.
propeller_long_range_reference_distance_fraction=0.018
# Minimum OpenAL reference distance for long-range propellers.
propeller_long_range_reference_distance_min=8.0
# Maximum OpenAL reference distance for long-range propellers.
propeller_long_range_reference_distance_max=18.0
# OpenAL rolloff factor for long-range propeller sources.
propeller_long_range_rolloff_factor=1.35
# Allows propeller_safe mode to keep the non-destructive source distance extension while bypassing acoustic/Doppler processing.
propeller_long_range_apply_in_safe_mode=true
# Opt-in extension for Crosswind vehicle propeller loops. Disabled by default to keep this pass focused on Aeronautics bearings.
propeller_long_range_apply_to_crosswind_vehicle_propellers=false
# Distance where propeller gameplay gain starts fading from near-field strength.
propeller_long_range_close_end_blocks=48.0
# Distance where propeller gameplay gain reaches the configured mid-distance gain.
propeller_long_range_mid_end_blocks=192.0
# Extra direct gain multiplier at the mid-distance propeller gameplay point.
propeller_long_range_mid_gain=0.22
# Minimum extra direct gain multiplier at the far end of propeller range.
propeller_long_range_far_min_gain=0.035
# Applies extra distant filtering/compression to long-range propeller sources.
propeller_far_field_enabled=true
# Legacy distance fraction where propeller far-field filtering begins.
propeller_far_field_start_fraction=0.25
# Absolute distance where balanced propeller far-field muffling starts.
propeller_far_field_start_blocks=72.0
# Absolute distance where balanced propeller far-field muffling reaches full strength.
propeller_far_field_full_blocks=280.0
# Range ratio where propeller far-field muffling starts.
propeller_far_field_start_ratio=0.08
# Range ratio where propeller far-field muffling reaches full strength.
propeller_far_field_full_ratio=0.35
# Legacy direct high-frequency cutoff multiplier at max propeller range.
propeller_far_field_direct_cutoff_at_max=0.35
# Legacy direct gain multiplier at max propeller range.
propeller_far_field_direct_gain_at_max=0.72
# Minimum direct high-frequency cutoff multiplier for balanced far propellers.
propeller_far_cutoff_min=0.28
# Additional per-source air absorption at max propeller far-field distance.
propeller_far_field_air_absorption_bonus=1.75
# Dampen excessive raw propeller source volume at mid/far distances.
propeller_far_compensate_high_source_volume=true
# Blend strength for high source-volume compensation at distance.
propeller_far_source_volume_compensation_strength=1.0
# Distance after which propeller processing skips expensive reverb rays and uses direct/far-field filtering only.
propeller_far_field_skip_reverb_after_distance=384.0
# Propeller-only listener exterior exposure compensation. Keeps outdoor/on-deck propellers loud while preserving cabin muffling.
propeller_outside_exposure_enabled=true
# Listener exposure ray count. Sampled once per listener update, not once per propeller.
propeller_outside_exposure_samples=32
# Maximum listener exposure ray length in blocks.
propeller_outside_exposure_ray_length=32.0
# Ticks between listener exposure resamples.
propeller_outside_exposure_update_ticks=5
# Smoothing blend for listener outside exposure.
propeller_outside_exposure_smoothing_alpha=0.25
# Propeller outside bleed mode. Supported values: legacy_blended_floor, floor_direct, occlusion_reduction.
propeller_outside_compensation_mode=floor_direct
# Weight applied to upward listener exposure rays.
propeller_outside_exposure_upward_bias=1.0
# Weight applied to mostly horizontal listener exposure rays.
propeller_outside_exposure_horizontal_bias=1.3
# Weight applied to downward listener exposure rays.
propeller_outside_exposure_downward_bias=0.4
# Exposure value where propeller exterior bleed starts becoming audible.
propeller_outside_compensation_start=0.3
# Exposure value where propeller exterior bleed reaches full configured strength.
propeller_outside_compensation_full=0.8
# How strongly outside exposure restores blocked propeller direct gain.
propeller_outside_gain_compensation_strength=0.8
# How strongly outside exposure restores blocked propeller high-frequency cutoff.
propeller_outside_cutoff_compensation_strength=0.4
# Direct gain floor target for heavily blocked propellers at full outside exposure.
propeller_outside_min_gain_at_full_exposure=0.45
# Direct cutoff floor target for heavily blocked propellers at full outside exposure.
propeller_outside_min_cutoff_at_full_exposure=0.18
# Occlusion reduction strength used by propeller outside bleed occlusion_reduction mode.
propeller_outside_occlusion_reduction_strength=0.65
# Minimum direct occlusion scale at full outside exposure in occlusion_reduction mode.
propeller_outside_min_occlusion_scale=0.35
# Propeller-only listener shelter suppression. Makes enclosed listeners more muffled while preserving openings.
propeller_shelter_suppression_enabled=true
# Outside exposure at or below which propeller shelter is strongest.
propeller_shelter_exposure_full=0.18
# Outside exposure at or above which propeller shelter suppression fades out.
propeller_shelter_exposure_start=0.62
# Maximum extra direct occlusion that shelter can add before gain/cutoff conversion.
propeller_shelter_max_extra_occlusion=1.1
# Blend strength for shelter extra direct occlusion.
propeller_shelter_occlusion_strength=0.6
# Optional post-direct gain damping strength under shelter. Defaults to 0 for v1.
propeller_shelter_gain_strength=0.0
# Optional post-direct cutoff damping strength under shelter. Defaults to 0 for v1.
propeller_shelter_cutoff_strength=0.0
# How strongly shelter reduces propeller near-field floors.
propeller_shelter_near_field_strength=0.7
# Minimum scale applied to near-field floors under full effective shelter.
propeller_shelter_near_field_min_scale=0.4
# Distance beyond propeller radius where shelter suppression starts.
propeller_shelter_distance_start=6.0
# Distance beyond propeller radius where shelter suppression reaches full strength.
propeller_shelter_distance_full=24.0
# Samples Aeronautics propellers as large annular emitters for direct occlusion.
propeller_large_emitter_occlusion_enabled=true
# Annular sample count for small and normal Aeronautics propellers.
propeller_large_emitter_small_samples=12
# Annular sample count for large Aeronautics propellers.
propeller_large_emitter_large_samples=24
# Maximum propeller large-emitter samples allowed after config clamping.
propeller_large_emitter_max_samples=64
# Inner annular sample ring radius as a fraction of reflected propeller radius.
propeller_large_emitter_inner_radius_factor=0.25
# Outer annular sample ring radius as a fraction of reflected propeller radius.
propeller_large_emitter_outer_radius_factor=0.9
# Optional hub/center contribution to propeller direct occlusion. 0.0 keeps sampling hubless.
propeller_large_emitter_center_weight=0.0
# Worst transmission fraction trimmed when at least twelve propeller samples are available.
propeller_large_emitter_trim_worst_fraction=0.15
# Maximum occlusion value counted as an open propeller sample.
propeller_large_emitter_open_sample_occlusion=0.15
# Discount exposed mechanical occluders only for propeller large-emitter samples.
propeller_minor_occluders_enabled=true
# Generic factor applied to propeller-only minor mechanical occluders.
propeller_minor_occluder_factor=0.2
# Minor mechanical factor once the ray distance is fully far-field.
propeller_minor_occluder_far_factor=0.1
# Minor mechanical factor near the propeller source.
propeller_minor_occluder_close_factor=0.35
# Maximum collision volume fraction for conservative small mechanical occluder classification.
propeller_minor_occluder_volume_threshold=0.25
# Maximum adjusted occlusion contribution from one generic minor occluder hit.
propeller_minor_occluder_max_contribution=0.2
# Distance where propeller minor-occluder factors start blending toward the far factor.
propeller_minor_occluder_distance_start=8.0
# Distance where propeller minor-occluder factors reach the far factor.
propeller_minor_occluder_distance_full=32.0
# Direct gain floor for active nearby large propellers.
propeller_near_field_gain_floor=0.5
# Direct low-pass cutoff floor for active nearby large propellers.
propeller_near_field_cutoff_floor=0.15
# Distance from the propeller disk where near-field floors start.
propeller_near_field_distance_start=4.0
# Distance from the propeller disk where near-field floors reach full strength.
propeller_near_field_distance_full=18.0
# Scale near-field distances by propeller radius.
propeller_near_field_scale_distance_by_radius=true
# Searches bounded listener-side aperture routes when every large-propeller direct sample is blocked.
propeller_diffraction_enabled=true
# Maximum listener-side aperture search radius in blocks.
propeller_diffraction_probe_radius=6.0
# Deterministic listener-side aperture probes per cached search.
propeller_diffraction_probe_samples=24
# Maximum reachable aperture candidates evaluated per search.
propeller_diffraction_max_candidates=6
# Deterministic subset of the existing source-disk pattern used per aperture candidate.
propeller_diffraction_source_samples=8
# Viable-route transmission percentile selected instead of a single best path.
propeller_diffraction_route_percentile=0.75
# Ticks a quantized aperture search may be reused.
propeller_diffraction_cache_ttl_ticks=5
# Relative score improvement required before changing to a clearer indirect route.
propeller_diffraction_switch_margin=0.15
# Consecutive evaluations required before changing to a clearer route.
propeller_diffraction_confirmations=3
# Large-propeller direct cutoff floor when both endpoints have outdoor evidence.
propeller_heavy_obstruction_outdoor_cutoff_floor=0.04
# Large-propeller direct gain floor when both endpoints have outdoor evidence.
propeller_heavy_obstruction_outdoor_gain_floor=0.35
# Large-propeller direct cutoff floor for enclosed or sealed heavy obstruction.
propeller_heavy_obstruction_enclosed_cutoff_floor=0.02
# Large-propeller direct gain floor for enclosed or sealed heavy obstruction.
propeller_heavy_obstruction_enclosed_gain_floor=0.25
# Per-source propeller direct smoothing alpha when occlusion increases.
propeller_occlusion_smoothing_attack_alpha=0.5
# Per-source propeller direct smoothing alpha when occlusion decreases.
propeller_occlusion_smoothing_release_alpha=0.25
# Listener/source movement deadband used for propeller one-block movement stability.
propeller_occlusion_smoothing_deadband_blocks=1.25
# Maximum direct gain/cutoff change per tick for stable propeller sources inside the deadband.
propeller_occlusion_smoothing_max_change_per_tick=0.25
# Maximum multiplicative direct-cutoff change per propeller evaluation.
propeller_occlusion_cutoff_max_ratio_per_update=2.0
# Maximum linear direct-gain change per propeller evaluation.
propeller_occlusion_gain_max_change_per_update=0.1
# Per-source propeller large-emitter result cache lifetime.
propeller_occlusion_cache_ttl_ticks=10
# Fraction of serious solid samples that marks a propeller as full_solid_blocked.
propeller_large_emitter_solid_sample_fraction=0.7
# Uses Distant Horizons LOD terrain to softly muffle far eligible propellers behind distant terrain.
distant_horizons_far_propeller_occlusion_enabled=false
# Minimum listener-to-propeller distance before Distant Horizons terrain occlusion may query.
distant_horizons_far_propeller_min_distance=192.0
# Tick interval for Distant Horizons terrain probes per propeller source.
distant_horizons_far_propeller_probe_interval_ticks=20
# Maximum DH terrain occlusion blend strength for far propellers.
distant_horizons_far_propeller_max_strength=0.8
# Direct gain multiplier when DH terrain occlusion reaches full configured strength.
distant_horizons_far_propeller_gain_at_full_occlusion=0.55
# Direct high-frequency cutoff multiplier when DH terrain occlusion reaches full configured strength.
distant_horizons_far_propeller_cutoff_at_full_occlusion=0.45
# Maximum Distant Horizons terrain ray length in blocks.
distant_horizons_far_propeller_max_ray_length=2048
# Logs compact Distant Horizons far propeller occlusion probe diagnostics.
distant_horizons_far_propeller_debug_logging=false
# Maximum acoustic sound starts processed per tick. 0 disables throttling.
sound_physics_max_sound_starts_per_tick=32
# Maximum debug rays queued per tick. 0 disables throttling.
sound_physics_max_debug_rays_per_tick=4096
# Coalesce repeated same-sound same-position impact bursts for a few ticks. Disabled by default to avoid suppressing room reverb on block interaction sounds.
sound_physics_impact_burst_dedupe_enabled=false
# Apply impact burst dedupe to tickable/continuous sounds. Disabled by default so machinery loops are not suppressed.
sound_physics_impact_burst_dedupe_apply_to_tickable_sounds=false
# Position radius used by impact burst dedupe.
sound_physics_impact_burst_dedupe_radius=1.5
# Tick window used by impact burst dedupe. 0 disables the tick window.
sound_physics_impact_burst_dedupe_ticks=2
# Diagnostic-only startup fallback for chicken leak debugging.
# Disabled by default because OpenAL direct-filter readback is not reliable enough to drive gameplay behavior.
sound_physics_preplay_fallback_enabled=false
# Disable level clone and cache. This will fall back to original main thread access.
# WARNING! Enabling this will cause instability and issues with other mods.
unsafe_level_access=false
# The radius of chunks to clone for level access
level_clone_range=4
# The maximum number of ticks to retain the cloned level in the cache
level_clone_max_retain_ticks=20
# The maximum distance a player can move from the cloned origin before invalidation
level_clone_max_retain_block_distance=16
# Enables a privacy-conscious client-side diagnostic flight recorder
flight_recorder_enabled=false
# Automatically opens one recorder session for each joined client world when enabled
flight_recorder_auto_session_per_world_join=true
# Input behavior for High detail: HOLD or TOGGLE; invalid values use HOLD
flight_recorder_high_detail_input_mode=HOLD
# Input behavior for Extreme detail: HOLD or TOGGLE; invalid values use HOLD
flight_recorder_extreme_detail_input_mode=HOLD
# Ticks between IDLE diagnostic samples
flight_recorder_idle_interval_ticks=20
# Ticks between routine recorder flushes
flight_recorder_flush_interval_ticks=20
# Maximum pending writer rows before low-priority rows are dropped
flight_recorder_max_buffered_lines=4096
# Maximum nonblocking audio-producer events queued for the client thread
flight_recorder_max_queued_audio_events=16384
# Maximum queued audio events drained at the start of each client tick
flight_recorder_max_audio_events_drained_per_tick=4096
# Shows numbered detail-transition markers in client chat
flight_recorder_emit_chat_markers=true
# Writes detail-transition markers to latest.log
flight_recorder_emit_log_markers=true
# Captures one existing-format tuning snapshot before each visible detail marker
flight_recorder_capture_tuning_snapshot_on_marker=true
# Adds bounded human-readable summaries alongside structured recorder fields
flight_recorder_include_human_summaries=true
# Maximum retained ray evidence rows for one Extreme acoustic evaluation
flight_recorder_extreme_max_ray_samples_per_evaluation=64
# Enables debug logging
debug_logging=false
# Provides more information about occlusion in the logs
occlusion_logging=false
# Provides more information about the environment calculation in the logs
environment_logging=false
# Provides more information about how long computations take
performance_logging=false
# If enabled, the path of the sound will be rendered in game
render_sound_bounces=false
# If enabled, occlusion will be visualized in game
render_occlusion=false
# Enables/Disables sound effects for Simple Voice Chat audio
simple_voice_chat_integration=true
# Enables/Disables hearing your own echo with Simple Voice Chat
simple_voice_chat_hear_self=false
